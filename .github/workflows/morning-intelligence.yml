name: SpekGen Morning Intelligence

on:
  schedule:
    # 8 AM Mexico City (UTC-6)
    - cron: '0 14 * * *'
  workflow_dispatch:  # Allow manual trigger

jobs:
  morning-intelligence:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create Google Service Account credentials file
        run: |
          python3 << 'EOF'
          import json
          import os
          creds_json = """${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}"""
          with open('/tmp/google-credentials.json', 'w') as f:
              json.dump(json.loads(creds_json), f)
          print("✅ Credentials file created")
          EOF

      - name: Populate Google Sheets (Setup)
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: /tmp/google-credentials.json
          MASTER_REGISTRY_SHEET_ID: ${{ secrets.MASTER_REGISTRY_SHEET_ID }}
          MORNING_INTELLIGENCE_LOG_SHEET_ID: ${{ secrets.MORNING_INTELLIGENCE_LOG_SHEET_ID }}
        run: python setup_sheets.py

      - name: Run SpekGen Morning Intelligence
        env:
          CLICKUP_TOKEN: ${{ secrets.CLICKUP_TOKEN }}
          GOOGLE_SERVICE_ACCOUNT_JSON: /tmp/google-credentials.json
          MASTER_REGISTRY_SHEET_ID: ${{ secrets.MASTER_REGISTRY_SHEET_ID }}
          MORNING_INTELLIGENCE_LOG_SHEET_ID: ${{ secrets.MORNING_INTELLIGENCE_LOG_SHEET_ID }}
          MORNING_INTELLIGENCE_FOLDER_ID: ${{ secrets.MORNING_INTELLIGENCE_FOLDER_ID }}
        run: python spekgen_morning_intelligence.py

      - name: Alert on failure
        if: failure()
        run: |
          echo "🚨 Morning Intelligence Failed"
          echo "Check logs at: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
